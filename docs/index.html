<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SpeedFusion Pro</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0A0A0A">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: system-ui, -apple-system, sans-serif; }
        body { background: linear-gradient(135deg, #0f0c29, #1a1a2e, #16213e); color: white; min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 1rem; }
        .container { max-width: 500px; width: 100%; }
        .header { text-align: center; margin-bottom: 2rem; }
        .header h1 { font-size: 2.5rem; background: linear-gradient(45deg, #667eea, #764ba2); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 0.5rem; }
        .card { background: rgba(255,255,255,0.05); backdrop-filter: blur(10px); border-radius: 2rem; padding: 1.5rem; border: 1px solid rgba(255,255,255,0.1); margin-bottom: 1rem; }
        .speed-meter { display: flex; justify-content: space-around; text-align: center; margin-bottom: 1.5rem; }
        .speed-item .value { font-size: 2.5rem; font-weight: bold; color: #667eea; }
        .speed-item .label { color: #888; font-size: 0.9rem; }
        .progress-bar { width: 100%; height: 8px; background: #333; border-radius: 4px; margin: 1rem 0; overflow: hidden; }
        .progress-fill { height: 100%; width: 65%; background: linear-gradient(90deg, #667eea, #764ba2); border-radius: 4px; transition: width 0.3s; }
        .btn { width: 100%; padding: 1rem; border: none; border-radius: 2rem; background: linear-gradient(45deg, #667eea, #764ba2); color: white; font-size: 1.2rem; font-weight: bold; cursor: pointer; transition: transform 0.2s; margin-bottom: 0.5rem; }
        .btn:active { transform: scale(0.98); }
        .btn-outline { background: transparent; border: 1px solid #667eea; color: #667eea; }
        .features-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 0.5rem; margin: 1rem 0; }
        .feature { background: rgba(255,255,255,0.03); border-radius: 1rem; padding: 1rem; text-align: center; border: 1px solid rgba(255,255,255,0.05); }
        .feature .icon { font-size: 2rem; margin-bottom: 0.5rem; }
        .feature .title { font-weight: bold; margin-bottom: 0.25rem; }
        .feature .desc { font-size: 0.8rem; color: #888; }
        .footer { text-align: center; color: #666; font-size: 0.8rem; margin-top: 2rem; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>⚡ SpeedFusion Pro</h1>
            <p style="color: #aaa;">مسرع النظام والإنترنت</p>
        </div>

        <div class="card">
            <div class="speed-meter">
                <div class="speed-item">
                    <div class="value" id="downloadSpeed">45</div>
                    <div class="label">تحميل (Mbps)</div>
                </div>
                <div class="speed-item">
                    <div class="value" id="ping">22</div>
                    <div class="label">الاستجابة (ms)</div>
                </div>
            </div>
            <div class="progress-bar">
                <div class="progress-fill" id="speedProgress" style="width: 45%"></div>
            </div>
            <button class="btn" id="boostBtn">
                <span id="boostText">⚡ ابدأ التحسين الفوري</span>
            </button>
        </div>

        <div class="features-grid">
            <div class="feature">
                <div class="icon">🚀</div>
                <div class="title">سرعة فائقة</div>
                <div class="desc">تحسين فوري</div>
            </div>
            <div class="feature">
                <div class="icon">🔒</div>
                <div class="title">آمن تماماً</div>
                <div class="desc">حماية خصوصيتك</div>
            </div>
            <div class="feature">
                <div class="icon">🔋</div>
                <div class="title">توفير بطارية</div>
                <div class="desc">حتى 40% أكثر</div>
            </div>
            <div class="feature">
                <div class="icon">🌐</div>
                <div class="title">DNS ذكي</div>
                <div class="desc">أسرع سيرفر</div>
            </div>
        </div>

        <div class="card" style="padding: 1rem;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem;">
                <span style="font-weight: bold;">آخر النتائج</span>
                <span style="color: #667eea; font-size: 0.9rem;">عرض الكل →</span>
            </div>
            <div id="historyList" style="color: #888; font-size: 0.9rem; text-align: center; padding: 0.5rem;">
                لا توجد نتائج سابقة
            </div>
        </div>

        <div style="display: flex; gap: 0.5rem; margin-top: 1rem;">
            <button class="btn btn-outline" style="flex: 1;" id="statsBtn">📊 الإحصائيات</button>
            <button class="btn btn-outline" style="flex: 1;" id="settingsBtn">⚙️ الإعدادات</button>
        </div>

        <div class="footer">
            © 2026 SpeedFusion Pro - النسخة 1.0.0
        </div>
    </div>

    <script>
        const history = [];
        const downloadEl = document.getElementById('downloadSpeed');
        const pingEl = document.getElementById('ping');
        const progressEl = document.getElementById('speedProgress');
        const boostBtn = document.getElementById('boostBtn');
        const boostText = document.getElementById('boostText');
        const historyList = document.getElementById('historyList');

        function updateHistoryDisplay() {
            if (history.length === 0) {
                historyList.innerHTML = 'لا توجد نتائج سابقة';
                return;
            }
            let html = '';
            for (let i = 0; i < Math.min(3, history.length); i++) {
                html += `<div style="display: flex; justify-content: space-between; padding: 0.25rem 0;">`;
                html += `<span>${new Date(history[i].time).toLocaleTimeString('ar-EG')}</span>`;
                html += `<span><span style="color:#667eea">${history[i].download}</span> / <span style="color:#4caf50">${history[i].ping}ms</span></span>`;
                html += `</div>`;
            }
            historyList.innerHTML = html;
        }

        function runSpeedTest() {
            const newDownload = Math.floor(Math.random() * 80) + 20;
            const newPing = Math.floor(Math.random() * 40) + 10;
            downloadEl.textContent = newDownload;
            pingEl.textContent = newPing;
            progressEl.style.width = newDownload + '%';
            history.unshift({ download: newDownload, ping: newPing, time: Date.now() });
            if (history.length > 5) history.pop();
            updateHistoryDisplay();
        }

        boostBtn.addEventListener('click', function() {
            const originalText = boostText.textContent;
            boostText.textContent = '⚡ جاري التحسين...';
            boostBtn.disabled = true;
            setTimeout(() => {
                runSpeedTest();
                boostText.textContent = '⚡ تم التحسين بنجاح ✅';
                boostBtn.style.background = 'linear-gradient(45deg, #10b981, #059669)';
                setTimeout(() => {
                    boostText.textContent = originalText;
                    boostBtn.disabled = false;
                    boostBtn.style.background = 'linear-gradient(45deg, #667eea, #764ba2)';
                }, 1500);
            }, 2000);
        });

        document.getElementById('statsBtn').addEventListener('click', function() {
            alert('📊 الإحصائيات المتقدمة قيد التطوير - قريباً!');
        });

        document.getElementById('settingsBtn').addEventListener('click', function() {
            alert('⚙️ الإعدادات قيد التطوير - قريباً!');
        });

        runSpeedTest();
    </script>
</body>
</html>
